<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Capa - Resumo de Aprendizado</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
}

/* container principal */

.slide-container{
width:100%;
min-height:100vh;
background:#ffffff;
position:relative;
display:flex;
overflow:hidden;
}

.main-wrapper{
flex:1;
display:flex;
flex-direction:column;
position:relative;
}

/* elementos decorativos */

.geo-element-1{
position:absolute;
width:450px;
height:450px;
background:#2791f5;
border-radius:50%;
top:-150px;
right:-150px;
opacity:0.12;
}

.geo-element-2{
position:absolute;
width:300px;
height:300px;
background:#2791f5;
border-radius:50%;
bottom:-100px;
left:-100px;
opacity:0.08;
}

.geo-element-3{
position:absolute;
width:200px;
height:200px;
border:3px solid #2791f5;
border-radius:50%;
top:50%;
right:120px;
transform:translateY(-50%);
opacity:0.15;
}

.geo-element-4{
position:absolute;
width:80px;
height:80px;
background:#2791f5;
bottom:180px;
right:180px;
opacity:0.25;
}

/* logo */

.logo-section{
padding:40px 5vw 0;
z-index:10;
}

.logo-text{
font-size:clamp(32px,5vw,48px);
font-weight:800;
color:#2791f5;
}

.logo-subtext{
font-size:clamp(12px,2vw,16px);
font-weight:300;
color:#2D2D2D;
margin-top:-5px;
letter-spacing:2px;
}

/* conteúdo */

.content-section{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:0 8vw;
text-align:center;
z-index:10;
}

.code-icon{
font-size:clamp(40px,6vw,64px);
color:#2791f5;
margin-bottom:40px;
opacity:0.8;
}

.title-main{
font-size:clamp(36px,7vw,72px);
font-weight:800;
color:#2D2D2D;
line-height:1.1;
margin-bottom:10px;
}

.title-subtitle{
font-size:clamp(28px,6vw,56px);
font-weight:300;
color:#2791f5;
line-height:1.2;
margin-bottom:50px;
}

/* autor */

.author-section{
padding:0 5vw 40px;
z-index:10;
}

.author-name{
font-size:clamp(22px,3vw,32px);
font-weight:700;
color:#2D2D2D;
margin-bottom:5px;
}

.author-role{
font-size:clamp(16px,2.5vw,20px);
font-weight:400;
color:#666;
}

.author-company{
font-weight:600;
color:#2791f5;
}

/* barra inferior */

.orange-bar{
position:absolute;
bottom:0;
left:0;
right:0;
height:8px;
background:#2791f5;
z-index:20;
}

/* responsividade */

@media (max-width:768px){

.geo-element-1,
.geo-element-2,
.geo-element-3,
.geo-element-4{
display:none;
}

.content-section{
padding:0 25px;
}

.logo-section{
padding:25px;
}

.author-section{
padding:25px;
}

}

</style>

</head>

<body>

<div class="slide-container">
<div class="main-wrapper">

<div class="geo-element-1"></div>
<div class="geo-element-2"></div>
<div class="geo-element-3"></div>
<div class="geo-element-4"></div>

<!-- Logo -->

<div class="logo-section">

<div class="logo-text">PAN</div>
<div class="logo-subtext">BANCO PAN</div>

</div>

<!-- Conteúdo -->

<div class="content-section">

<div class="code-icon">
<i class="fas fa-code"></i>
</div>

<h1 class="title-main">Resumo de Aprendizado</h1>

<h2 class="title-subtitle">HTML & CSS</h2>

</div>

<!-- Autor -->

<div class="author-section">

<div class="author-name">David Almeida</div>

<div class="author-role">
<span class="author-company">Jovem Aprendiz</span> – Banco PAN
</div>

<a href="slide2.html" class="pan-button">
    Ir para próxima página
</a>

<style>

.pan-button{
display:inline-block;
background:#2791f5;
color:#FFFFFF;
font-family:'Montserrat', sans-serif;
font-weight:700;
font-size:16px;
padding:7px 3px;
border-radius:8px;
text-decoration:none;
box-shadow:0 4px 14px rgba(0, 102, 255, 0.35);
transition:all .25s ease;
}

/* hover */

.pan-button:hover{
background:#2791f5;
transform:translateY(-2px);
box-shadow:0 6px 18px rgba(0, 102, 255, 0.35);
}

/* clique */

.pan-button:active{
transform:translateY(0);
box-shadow:0 3px 8px rgba(0, 102, 255, 0.35);
}

</style>

</div>

<div class="orange-bar"></div>

</div>
</div>

</body>
</html>
