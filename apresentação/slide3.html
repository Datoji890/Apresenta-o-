<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>O que aprendi</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:#fff;
}

/* container */

.slide-container{
width:100%;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#FFFFFF;
position:relative;
}

.main-wrapper{
width:100%;
max-width:1200px;
display:flex;
flex-direction:column;
position:relative;
}

/* elementos decorativos */

.geo-element-1{
position:absolute;
width:320px;
height:320px;
background:#2791f5;
border-radius:50%;
top:-80px;
right:-60px;
opacity:0.07;
}

.geo-element-2{
position:absolute;
width:150px;
height:150px;
background:#2791f5;
border-radius:50%;
bottom:100px;
left:80px;
opacity:0.05;
}

.geo-element-3{
position:absolute;
width:100px;
height:100px;
border:2px solid #2791f5;
border-radius:50%;
top:250px;
left:120px;
opacity:0.1;
}

/* header */

.header-section{
padding:40px 5vw;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #F0F0F0;
z-index:10;
}

.logo-text{
font-size:clamp(24px,4vw,32px);
font-weight:800;
color:#2791f5;
}

.logo-subtext{
font-size:clamp(10px,2vw,12px);
font-weight:300;
color:#2D2D2D;
letter-spacing:1.5px;
}

/* conteúdo */

.content-section{
flex:1;
display:flex;
flex-direction:column;
padding:40px 6vw 30px;
z-index:10;
}

.slide-title{
font-size:clamp(32px,6vw,54px);
font-weight:700;
color:#2D2D2D;
margin-bottom:40px;
}

/* lista */

.list-container{
display:flex;
flex-direction:column;
gap:20px;
}

.list-item{
display:flex;
align-items:center;
gap:20px;
padding:18px 22px;
background:#FAFAFA;
border-radius:8px;
border-left:4px solid #2791f5;
transition:all 0.2s ease;
}

.list-item:hover{
background:#FFF5F0;
transform:translateX(5px);
}

.icon-wrapper{
flex-shrink:0;
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
background:#FFFFFF;
border-radius:10px;
box-shadow:0 2px 6px rgba(0, 102, 255, 0.35);
font-size:20px;
}

.item-text{
flex:1;
font-size:clamp(16px,2.5vw,20px);
font-weight:500;
color:#4A4A4A;
line-height:1.5;
}

/* footer */

.footer-section{
padding:20px 5vw;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
z-index:10;
border-top:1px solid #F0F0F0;
}

.footer-text{
font-size:14px;
font-weight:600;
color:#666;
}

.footer-highlight{
color:#2791f5;
}

.page-number{
font-size:14px;
font-weight:600;
color:#999;
}

/* barra inferior */

.orange-bar{
position:absolute;
bottom:0;
left:0;
right:0;
height:6px;
background:#2791f5;
}

/* RESPONSIVO */

@media (max-width:768px){

.geo-element-1,
.geo-element-2,
.geo-element-3{
display:none;
}

.content-section{
padding:30px 20px;
}

.list-item{
gap:15px;
padding:15px;
}

.icon-wrapper{
width:38px;
height:38px;
font-size:18px;
}

}

</style>

</head>

<body>

<div class="slide-container">
<div class="main-wrapper">

<div class="geo-element-1"></div>
<div class="geo-element-2"></div>
<div class="geo-element-3"></div>

<!-- HEADER -->

<div class="header-section">

<div>
<div class="logo-text">PAN</div>
<div class="logo-subtext">BANCO PAN</div>
</div>

<div class="page-number">03</div>

</div>

<!-- CONTEÚDO -->

<div class="content-section">

<h1 class="slide-title">O que aprendi</h1>

<div class="list-container">

<div class="list-item">
<div class="icon-wrapper">📄</div>
<div class="item-text">Estrutura básica do HTML</div>
</div>

<div class="list-item">
<div class="icon-wrapper">💻</div>
<div class="item-text">Uso de tags como: main, input, form e div</div>
</div>

<div class="list-item">
<div class="icon-wrapper">🎨</div>
<div class="item-text">Estilização de páginas com CSS</div>
</div>

<div class="list-item">
<div class="icon-wrapper">📐</div>
<div class="item-text">Organização de layout</div>
</div>

<div class="list-item">
<div class="icon-wrapper">🎯</div>
<div class="item-text">Uso de cores, espaçamentos e alinhamentos</div>
</div>

</div>
</div>

<!-- FOOTER -->

<div class="footer-section">

<div class="footer-text">
<span class="footer-highlight">Jovem Aprendiz</span> – Banco PAN
</div>

<a href="slide4.html" class="pan-button">
    Ir para próxima página
</a>
<style>

.pan-button{
display:inline-block;
background:#2791f5;
color:#FFFFFF;
font-family:'Montserrat', sans-serif;
font-weight:700;
font-size:16px;
padding:7px 3px;
border-radius:8px;
text-decoration:none;
box-shadow:0 4px 14px rgba(0, 102, 255, 0.35);
transition:all .25s ease;
}

/* hover */

.pan-button:hover{
background:#2791f5;
transform:translateY(-2px);
box-shadow:0 6px 18px rgba(0, 102, 255, 0.35);
}

/* clique */

.pan-button:active{
transform:translateY(0);
box-shadow:0 3px 8px rgba(0, 102, 255, 0.35);
}

</style>

<div class="footer-text">
David Almeida
</div>

</div>

<div class="orange-bar"></div>

</div>
</div>

</body>
</html>
