<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ferramentas Utilizadas</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
}

.slide-container{
width:100%;
min-height:100vh;
background:#FFFFFF;
position:relative;
display:flex;
overflow:hidden;
}

.main-wrapper{
flex:1;
display:flex;
flex-direction:column;
position:relative;
}

/* Elementos decorativos */

.geo-element-1{
position:absolute;
width:300px;
height:300px;
background:#2791f5;
border-radius:50%;
top:-70px;
right:-50px;
opacity:0.06;
}

.geo-element-2{
position:absolute;
width:140px;
height:140px;
background:#2791f5;
border-radius:50%;
bottom:120px;
left:90px;
opacity:0.05;
}

.geo-element-3{
position:absolute;
width:90px;
height:90px;
border:2px solid #2791f5;
border-radius:50%;
top:280px;
right:140px;
opacity:0.1;
}

/* Header */

.header-section{
padding:40px 80px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #F0F0F0;
z-index:10;
}

.logo-text{
font-size:32px;
font-weight:800;
color:#2791f5;
}

.logo-subtext{
font-size:12px;
font-weight:300;
color:#2D2D2D;
letter-spacing:1.5px;
}

/* Conteúdo */

.content-section{
flex:1;
display:flex;
flex-direction:column;
padding:45px 80px 30px;
z-index:10;
}

.title-section{
margin-bottom:40px;
}

.slide-title{
font-size:54px;
font-weight:700;
color:#2D2D2D;
}

.cards-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:35px;
flex:1;
}

.tool-card{
background:#FAFAFA;
border-radius:12px;
padding:35px 30px;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
border:2px solid #F0F0F0;
transition:all 0.3s ease;
box-shadow:0 2px 8px rgba(0,0,0,0.04);
}

.tool-card:hover{
background:#FFF5F0;
border-color:#FFD4BA;
transform:translateY(-3px);
box-shadow:0 4px 16px rgba(0, 102, 255, 0.35);
}

.card-icon-wrapper{
width:90px;
height:90px;
border-radius:50%;
background:#FFFFFF;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:25px;
box-shadow:0 4px 12px rgba(0, 102, 255, 0.35);
}

.card-title{
font-size:26px;
font-weight:700;
color:#2D2D2D;
margin-bottom:12px;
}

.card-description{
font-size:17px;
color:#666;
}

/* Footer */

.footer-section{
padding:25px 80px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
}

.footer-text{
font-size:14px;
font-weight:600;
color:#666;
}

.footer-highlight{
color:#2791f5;
}

.page-number{
font-size:14px;
font-weight:600;
color:#999;
}

.orange-bar{
position:absolute;
bottom:0;
left:0;
right:0;
height:6px;
background:#2791f5;
}

</style>
</head>

<body>

<div class="slide-container">
<div class="main-wrapper">

<div class="geo-element-1"></div>
<div class="geo-element-2"></div>
<div class="geo-element-3"></div>

<!-- HEADER -->

<div class="header-section">

<div>
<div class="logo-text">PAN</div>
<div class="logo-subtext">BANCO PAN</div>
</div>

<div class="page-number">04</div>

</div>

<!-- CONTEÚDO -->

<div class="content-section">

<div class="title-section">
<h1 class="slide-title">Ferramentas Utilizadas</h1>
</div>

<div class="cards-grid">

<div class="tool-card">
<div class="card-icon-wrapper">💻</div>
<div class="card-title">HTML</div>
<div class="card-description">Para estruturar páginas</div>
</div>

<div class="tool-card">
<div class="card-icon-wrapper">🎨</div>
<div class="card-title">CSS</div>
<div class="card-description">Para estilização e aparência</div>
</div>

<div class="tool-card">
<div class="card-icon-wrapper">🧑‍💻</div>
<div class="card-title">VS Code</div>
<div class="card-description">Editor de código</div>
</div>

<div class="tool-card">
<div class="card-icon-wrapper">🌐</div>
<div class="card-title">Navegador</div>
<div class="card-description">Para testes e visualização</div>
</div>

</div>
</div>

<!-- FOOTER -->

<div class="footer-section">

<div class="footer-text">
<span class="footer-highlight">Jovem Aprendiz</span> – Banco PAN
</div>

<a href="slide5.html" class="pan-button">
    Ir para próxima página
</a>
<style>

.pan-button{
display:inline-block;
background:#2791f5;
color:#FFFFFF;
font-family:'Montserrat', sans-serif;
font-weight:700;
font-size:16px;
padding:7px 3px;
border-radius:8px;
text-decoration:none;
box-shadow:0 4px 14px rgba(0, 102, 255, 0.35);
transition:all .25s ease;
}

/* hover */

.pan-button:hover{
background:#2791f5;
transform:translateY(-2px);
box-shadow:0 6px 18px rgba(0, 102, 255, 0.35);
}

/* clique */

.pan-button:active{
transform:translateY(0);
box-shadow:0 3px 8px rgba(0, 102, 255, 0.35);
}

</style>

<div class="footer-text">
David Almeida
</div>

</div>

<div class="orange-bar"></div>

</div>
</div>

</body>
</html>
