<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Projetos Desenvolvidos</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:#fff;
}

/* container */

.slide-container{
min-height:100vh;
display:flex;
flex-direction:column;
position:relative;
overflow:hidden;
}

/* geometric elements */

.geo-element-1{
position:absolute;
width:240px;
height:240px;
background:#2791f5;
border-radius:50%;
top:-60px;
right:-40px;
opacity:.06;
}

.geo-element-2{
position:absolute;
width:120px;
height:120px;
background:#2791f5;
border-radius:50%;
bottom:80px;
left:40px;
opacity:.05;
}

.geo-element-3{
position:absolute;
width:80px;
height:80px;
border:2px solid #2791f5;
border-radius:50%;
top:260px;
right:90px;
opacity:.1;
}

/* header */

.header-section{
padding:20px 5%;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #f0f0f0;
}

.logo-text{
font-size:clamp(22px,4vw,32px);
font-weight:800;
color:#2791f5;
}

.logo-subtext{
font-size:12px;
letter-spacing:1px;
color:#2d2d2d;
}

.page-number{
font-weight:600;
color:#999;
}

/* content */

.content-section{
flex:1;
padding:40px 5%;
display:flex;
flex-direction:column;
}

.slide-title{
font-size:clamp(32px,6vw,54px);
font-weight:700;
color:#2d2d2d;
margin-bottom:40px;
}

/* projects grid */

.projects-grid{
display:grid;
grid-template-columns:1fr;
gap:20px;
}

@media(min-width:768px){

.projects-grid{
grid-template-columns:1fr 1fr;
gap:28px;
}

}

/* project card */

.project-card{
background:#FAFAFA;
border-radius:12px;
padding:24px;
display:flex;
align-items:center;
gap:20px;
border:2px solid #F0F0F0;
transition:.3s;
position:relative;
overflow:hidden;
}

.project-card:hover{
background:#FFF5F0;
border-color:#FFD4BA;
transform:translateX(4px);
box-shadow:0 6px 18px rgba(0, 102, 255, 0.35);
}

.project-card::before{
content:'';
position:absolute;
left:0;
top:0;
bottom:0;
width:5px;
background:#2791f5;
}

.project-icon-wrapper{
flex-shrink:0;
width:64px;
height:64px;
border-radius:10px;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 12px rgba(0, 102, 255, 0.35);
}

.project-content{
display:flex;
flex-direction:column;
gap:6px;
}

.project-badge{
display:inline-block;
padding:4px 10px;
background:#2791f5;
color:#fff;
font-size:11px;
font-weight:700;
border-radius:4px;
text-transform:uppercase;
}

.project-title{
font-size:clamp(18px,2.5vw,22px);
font-weight:700;
color:#2d2d2d;
}

/* footer */

.footer-section{
padding:20px 5%;
display:flex;
flex-direction:column;
gap:6px;
}

@media(min-width:768px){

.footer-section{
flex-direction:row;
justify-content:space-between;
align-items:center;
}

}

.footer-text{
font-size:14px;
font-weight:600;
color:#666;
}

.footer-highlight{
color:#2791f5;
}

/* orange bar */

.orange-bar{
height:6px;
background:#2791f5;
width:100%;
}

</style>

</head>

<body>

<div class="slide-container">

<div class="geo-element-1"></div>
<div class="geo-element-2"></div>
<div class="geo-element-3"></div>

<!-- HEADER -->

<div class="header-section">

<div>
<div class="logo-text">PAN</div>
<div class="logo-subtext">BANCO PAN</div>
</div>

<div class="page-number">05</div>

</div>

<!-- CONTENT -->

<div class="content-section">

<h1 class="slide-title">Projetos Desenvolvidos</h1>

<div class="projects-grid">

<div class="project-card">

<div class="project-icon-wrapper">📄</div>

<div class="project-content">
<div class="project-badge">Projeto 01</div>
<div class="project-title">Página de Login</div>
</div>

</div>

<div class="project-card">

<div class="project-icon-wrapper">📝</div>

<div class="project-content">
<div class="project-badge">Projeto 02</div>
<div class="project-title">Página de Formulário</div>
</div>

</div>

<div class="project-card">

<div class="project-icon-wrapper">🚀</div>

<div class="project-content">
<div class="project-badge">Projeto 03</div>
<div class="project-title">Botão de CTA</div>
</div>

</div>

<div class="project-card">

<div class="project-icon-wrapper">🎨</div>

<div class="project-content">
<div class="project-badge">Projeto 04</div>
<div class="project-title">Ajustes de Layout e Design</div>
</div>

</div>

</div>

</div>

<!-- FOOTER -->

<div class="footer-section">

<div class="footer-text">
<span class="footer-highlight">Jovem Aprendiz</span> – Banco PAN
</div>

<a href="slide6.html" class="pan-button">
    Ir para próxima página
</a>
<style>

.pan-button{
display:inline-block;
background:#2791f5;
color:#FFFFFF;
font-family:'Montserrat', sans-serif;
font-weight:700;
font-size:16px;
padding:7px 3px;
border-radius:8px;
text-decoration:none;
box-shadow:0 4px 14px rgba(0, 102, 255, 0.35);
transition:all .25s ease;
}

/* hover */

.pan-button:hover{
background:#2791f5;
transform:translateY(-2px);
box-shadow:0 6px 18px rgba(0, 102, 255, 0.35);
}

/* clique */

.pan-button:active{
transform:translateY(0);
box-shadow:0 3px 8px rgba(0, 102, 255, 0.35);
}

</style>

<div class="footer-text">
David Almeida
</div>

</div>

<div class="orange-bar"></div>

</div>

</body>
</html>
