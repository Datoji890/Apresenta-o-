<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Introdução</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
}

.slide-container{
width:100%;
min-height:100vh;
background:#FFFFFF;
position:relative;
display:flex;
overflow:hidden;
}

.main-wrapper{
flex:1;
display:flex;
flex-direction:column;
position:relative;
}

/* elementos decorativos */

.geo-element-1{
position:absolute;
width:350px;
height:350px;
background:#2791f5;
border-radius:50%;
top:-100px;
right:-80px;
opacity:0.08;
}

.geo-element-2{
position:absolute;
width:180px;
height:180px;
background:#2791f5;
border-radius:50%;
bottom:80px;
left:60px;
opacity:0.06;
}

.geo-element-3{
position:absolute;
width:120px;
height:120px;
border:2px solid #2791f5;
border-radius:50%;
top:200px;
left:100px;
opacity:0.12;
}

.geo-element-4{
position:absolute;
width:60px;
height:60px;
background:#2791f5;
bottom:200px;
right:150px;
opacity:0.2;
}

/* HEADER */

.header-section{
padding:40px 5vw;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
border-bottom:1px solid #F0F0F0;
}

.logo-text{
font-size:32px;
font-weight:800;
color:#2791f5;
}

.logo-subtext{
font-size:12px;
font-weight:300;
color:#2D2D2D;
letter-spacing:1.5px;
}

/* CONTENT */

.content-section{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:60px 8vw;
text-align:center;
z-index:10;
}

.icon-container{
width:140px;
height:140px;
border-radius:50%;
background:#699eff28;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:40px;
border:3px solid #699eff28;
}

.tech-icon{
font-size:56px;
color:#2791f5;
}

.slide-title{
font-size:clamp(32px,5vw,54px);
font-weight:700;
color:#2D2D2D;
margin-bottom:30px;
}

.description-box{
background:#FAFAFA;
border-left:5px solid #2791f5;
padding:35px 45px;
border-radius:8px;
max-width:900px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.description-text{
font-size:clamp(16px,2vw,22px);
color:#4A4A4A;
line-height:1.6;
}

/* FOOTER */

.footer-section{
padding:25px 5vw;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
flex-wrap:wrap;
gap:10px;
}

.footer-text{
font-size:14px;
font-weight:600;
color:#666666;
}

.footer-highlight{
color:#2791f5;
}

.page-number{
font-size:14px;
font-weight:600;
color:#999999;
}

.orange-bar{
position:absolute;
bottom:0;
left:0;
right:0;
height:6px;
background:#2791f5;
z-index:20;
}

/* RESPONSIVO */

@media (max-width:768px){

.header-section{
padding:20px;
}

.content-section{
padding:40px 20px;
}

.icon-container{
width:90px;
height:90px;
}

.tech-icon{
font-size:36px;
}

.description-box{
padding:20px;
}

.footer-section{
flex-direction:column;
align-items:flex-start;
}

.geo-element-1,
.geo-element-2,
.geo-element-3,
.geo-element-4{
display:none;
}

}

</style>
</head>

<body>

<div class="slide-container">
<div class="main-wrapper">

<div class="geo-element-1"></div>
<div class="geo-element-2"></div>
<div class="geo-element-3"></div>
<div class="geo-element-4"></div>

<!-- HEADER -->

<div class="header-section">

<div>
<div class="logo-text">PAN</div>
<div class="logo-subtext">BANCO PAN</div>
</div>

<div class="page-number">02</div>

</div>

<!-- CONTENT -->

<div class="content-section">

<div class="icon-container">
<i class="fas fa-laptop-code tech-icon"></i>
</div>

<h1 class="slide-title">Introdução</h1>

<div class="description-box">
<p class="description-text">
Nesta apresentação mostro um resumo do que aprendi, o que desenvolvi e como apliquei meus conhecimentos em HTML e CSS durante meus estudos.
</p>
</div>

</div>

<!-- FOOTER -->

<div class="footer-section">

<div class="footer-text">
<span class="footer-highlight">Jovem Aprendiz</span> – Banco PAN
</div>

<a href="slide3.html" class="pan-button">
    Ir para próxima página
</a>
<style>

.pan-button{
display:inline-block;
background:#2791f5;
color:#FFFFFF;
font-family:'Montserrat', sans-serif;
font-weight:700;
font-size:16px;
padding:7px 3px;
border-radius:8px;
text-decoration:none;
box-shadow:0 4px 14px rgba(0, 102, 255, 0.35);
transition:all .25s ease;
}

/* hover */

.pan-button:hover{
background:#2791f5;
transform:translateY(-2px);
box-shadow:0 6px 18px rgba(0, 102, 255, 0.35);
}

/* clique */

.pan-button:active{
transform:translateY(0);
box-shadow:0 3px 8px rgba(0, 102, 255, 0.35);
}

</style>

<div class="footer-text">
David Almeida
</div>



</div>

<div class="orange-bar"></div>

</div>
</div>

</body>
</html>
